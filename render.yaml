services:
  - type: web
    name: djup-api
    env: python
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && pip install -r requirements.txt && alembic upgrade head
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: djup-db
          property: connectionString
      - key: FRED_API_KEY
        sync: false
      - key: FMP_API_KEY
        sync: false
      - key: SEC_USER_AGENT
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: djup-db
    databaseName: djup
    user: djup_user
    plan: free
